.medio-btn.acid.active .label { color: #f5c4a8; }

.medio-btn.neut.active { background: #BA7517; color: #fff; }
.medio-btn.neut .label { color: #d4a050; }
.medio-btn.neut.active .label { color: #FAC775; }

.tipo-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #666; transition: all 0.15s; display: inline-block; }
.tipo-chip.on { font-weight: 600; }
.tipo-chip.on-p { background: #E6F1FB; color: #0C447C; border-color: #378ADD; }
.tipo-chip.on-s { background: #EAF3DE; color: #27500A; border-color: #639922; }
.tipo-chip.on-t { background: #FAEEDA; color: #633806; border-color: #BA7517; }
.tipo-chip.on-e { background: #FBEAF0; color: #4B1528; border-color: #D4537E; }

.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 16px; }
.rxn-card {
  background: #fff; border-radius: 10px; padding: 12px;
  border-left: 4px solid #ddd; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  transition: transform 0.15s;
}
.rxn-card:hover { transform: translateY(-2px); }
.rxn-card .sustrato { font-size: 11px; color: #999; margin-bottom: 4px; }
.rxn-card .producto { font-size: 13px; font-weight: 700; color: #222; margin-bottom: 4px; line-height: 1.3; }
.rxn-card .grupo { font-size: 10px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 6px; }
.rxn-card .reactivo { font-size: 11px; color: #666; }
.rxn-card .mecanismo { font-size: 10px; font-weight: 700; margin-top: 4px; }

.empty { text-align: center; padding: 40px; color: #ccc; font-size: 14px; }

/* ── COLUMN CHART ── */

  width: 100%; overflow-x: auto;

.col-chart-svg-wrap {

  width: 100%;
  position: relative;

.col-chart-grid line { stroke: #f0f0f0; stroke-width: 1; }
.col-chart-bar { transition: opacity 0.15s; cursor: default; }
.col-chart-bar:hover { opacity: 0.8; }
.col-chart-label { font-size: 9px; fill: #888; font-family: Arial, sans-serif; }
.col-chart-val { font-size: 10px; font-weight: 700; font-family: Arial, sans-serif; }
.col-chart-axis { stroke: #e0e0e0; stroke-width: 1; }

  Especial:  { label: 'Especial',   cls: 'on-e' },
};

let currentMedio = 'all';
let currentTipo = 'all';

function countByMedio(medio) {
  return DATA.filter(d => {
    const medioOk = medio === 'all' || d.medio === medio;
    const tipoOk  = currentTipo === 'all' || d.tipo === currentTipo;
    return medioOk && tipoOk;
  }).length;
}

function buildMedios() {
  const container = document.getElementById('mediosBtns');
  container.innerHTML = '';
  Object.entries(MEDIO_CFG).forEach(([key, cfg]) => {
    const btn = document.createElement('div');
    btn.className = 'medio-btn ' + cfg.cls + (key === currentMedio ? ' active' : '');
    btn.innerHTML = `<span class="count">${countByMedio(key)}</span><span style="font-size:14px;font-weight:700">${cfg.label}</span><span class="label">reacciones</span>`;
    btn.onclick = () => { currentMedio = key; render(); };
    container.appendChild(btn);
  });
}

function buildTipos() {
  const container = document.getElementById('tipoChips');
  container.innerHTML = '';
  Object.entries(TIPO_CFG).forEach(([key, cfg]) => {
    const chip = document.createElement('span');
    chip.className = 'tipo-chip' + (key === currentTipo ? ' on ' + cfg.cls : '');
    chip.textContent = cfg.label;
    chip.onclick = () => { currentTipo = key; render(); };
    container.appendChild(chip);
  });
}

function getFiltered() {
  return DATA.filter(d => {
    const medioOk = currentMedio === 'all' || d.medio === currentMedio;
    const tipoOk = currentTipo === 'all' || d.tipo === currentTipo;
    return medioOk && tipoOk;
  });
}

/* ── COLUMN CHART (Power BI style) ── */
function renderColChart(filtered) {
  const wrap = document.getElementById('colChartWrap');
  const counts = {};
  filtered.forEach(d => { counts[d.grupo] = (counts[d.grupo] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);

  if (!sorted.length) { wrap.innerHTML = '<p style="color:#ccc;font-size:12px;padding:20px">Sin datos</p>'; return; }

  const maxVal = sorted[0][1];
  const W = wrap.offsetWidth || 400;
  const H = 220;
  const padL = 8, padR = 8, padT = 24, padB = 60;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = sorted.length;
  const barW = Math.max(12, Math.min(40, (chartW / n) * 0.6));
  const gap = chartW / n;

  // grid lines
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(f => {
    const y = padT + chartH - f * chartH;
    const val = Math.round(f * maxVal);
    return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#f0f0f0" stroke-width="1"/>
            <text x="${padL}" y="${y - 3}" font-size="8" fill="#ccc" font-family="Arial">${val}</text>`;
  }).join('');

  // bars
  const bars = sorted.map(([grupo, cnt], i) => {
    const color = GRUPO_COLORS[grupo] || '#aaa';
    const barH = (cnt / maxVal) * chartH;
    const x = padL + gap * i + gap / 2 - barW / 2;
    const y = padT + chartH - barH;
    // truncate label
    const short = grupo.length > 10 ? grupo.slice(0,9)+'…' : grupo;
    // rotate label
    const lx = padL + gap * i + gap / 2;
    const ly = padT + chartH + 6;
    return `
      <rect class="col-chart-bar" x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${color}" rx="3"/>
      <text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="9" font-weight="700" fill="${color}" font-family="Arial">${cnt}</text>
      <text transform="translate(${lx},${ly}) rotate(40)" text-anchor="start" font-size="8" fill="#888" font-family="Arial">${short}</text>
    `;
  }).join('');

  // axis
  const axis = `<line x1="${padL}" y1="${padT + chartH}" x2="${W - padR}" y2="${padT + chartH}" stroke="#e0e0e0" stroke-width="1"/>`;

  wrap.innerHTML = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
    ${gridLines}${axis}${bars}
  </svg>`;
}

/* ── DONUT CHART (Power BI style) ── */
function renderDonut(filtered) {
  const wrap = document.getElementById('donutWrap');
  const counts = {};
  filtered.forEach(d => { counts[d.mecanismo] = (counts[d.mecanismo] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const total = filtered.length;

  if (!sorted.length) { wrap.innerHTML = '<p style="color:#ccc;font-size:12px">Sin datos</p>'; return; }

  const R = 60, r = 36, cx = 70, cy = 70, size = 140;
  let angle = -Math.PI / 2;

  const slices = sorted.map(([mec, cnt]) => {
    const color = MECH_COLORS[mec] || '#aaa';
    const frac = cnt / total;
    const sweep = frac * 2 * Math.PI;
    const x1 = cx + R * Math.cos(angle);
    const y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(angle + sweep);
    const y2 = cy + R * Math.sin(angle + sweep);
    const ix1 = cx + r * Math.cos(angle);
    const iy1 = cy + r * Math.sin(angle);
    const ix2 = cx + r * Math.cos(angle + sweep);
    const iy2 = cy + r * Math.sin(angle + sweep);
    const large = sweep > Math.PI ? 1 : 0;
    const path = `M ${ix1} ${iy1} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${r} ${r} 0 ${large} 0 ${ix1} ${iy1} Z`;
    angle += sweep;
    return `<path d="${path}" fill="${color}" stroke="#fff" stroke-width="1.5" style="transition:opacity 0.15s" onmouseover="this.style.opacity=0.75" onmouseout="this.style.opacity=1"/>`;
  }).join('');

  const svg = `<svg width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
    ${slices}
    <circle cx="${cx}" cy="${cy}" r="${r - 2}" fill="#fff"/>
    <text x="${cx}" y="${cy - 6}" text-anchor="middle" font-size="20" font-weight="700" fill="#1F4E79" font-family="Arial">${total}</text>
    <text x="${cx}" y="${cy + 10}" text-anchor="middle" font-size="9" fill="#999" font-family="Arial">reacciones</text>
  </svg>`;

  const legend = sorted.map(([mec, cnt]) => {
    const color = MECH_COLORS[mec] || '#aaa';
    const pct = Math.round(cnt / total * 100);
    return `<div class="donut-legend-item">
      <div class="donut-legend-dot" style="background:${color}"></div>
      <span>${mec}</span>
      <span class="donut-legend-val" style="color:${color}">${pct}%</span>
    </div>`;
  }).join('');

  wrap.innerHTML = svg + `<div class="donut-legend">${legend}</div>`;
}

function renderCards(filtered) {
  const label = document.getElementById('cardsLabel');
  label.textContent = `${filtered.length} reacciones encontradas`;
  const medioColors = { Acido:'#D85A30', Basico:'#378ADD', Anhidro:'#639922', Neutro:'#BA7517' };
  const tipoColors = { Primario:'#378ADD', Secundario:'#639922', Terciario:'#BA7517', Especial:'#D4537E' };

  const html = filtered.map(d => {
    const color = GRUPO_COLORS[d.grupo] || '#888';
    const mc = medioColors[d.medio] || '#888';
    return `<div class="rxn-card" style="border-left-color:${color}">
      <div class="sustrato">${d.sustrato} <span style="color:${tipoColors[d.tipo]||'#888'};font-weight:600">(${d.tipo})</span></div>
      <div class="producto">${d.producto}</div>
      <span class="grupo" style="background:${color}22;color:${color}">${d.grupo}</span>
      <div class="reactivo">+ ${d.reactivo}</div>
      <div class="mecanismo" style="color:${mc}">● ${d.mecanismo} · ${d.medio}</div>
    </div>`;
  }).join('') || '<div class="empty">Sin reacciones para este filtro</div>';

  document.getElementById('cardsGrid').innerHTML = html;
}

function render() {
  buildMedios();
  buildTipos();
  const filtered = getFiltered();
  renderColChart(filtered);
  renderDonut(filtered);
  renderCards(filtered);
}

// re-render column chart on resize
window.addEventListener('resize', () => render());

render();
</script>
</body>
</html>
